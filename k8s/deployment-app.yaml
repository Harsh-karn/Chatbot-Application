apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  PORT: "5000"
  NODE_ENV: "production"
  DATABASE_URL: "postgresql://postgres:postgres_password@db:5432/inference_logger?schema=public"
  REDIS_URL: "redis://redis:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: app
spec:
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 2 # Standard multi-replica setup for high availability scaling
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: your-registry/inference-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: app-config
          env:
            # Sensitive keys reference a Kubernetes Secret (created via kubectl create secret generic llm-secrets)
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: gemini-api-key
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: openai-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: anthropic-api-key
                  optional: true
